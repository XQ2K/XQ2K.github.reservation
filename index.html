<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>预约我的时间</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f6f7fb;
      color: #111827;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    h1 {
      font-size: 32px;
      margin: 8px 0 10px;
    }

    h2 {
      font-size: 22px;
      margin: 0 0 12px;
    }

    p {
      line-height: 1.7;
      color: #4b5563;
    }

    .muted {
      color: #6b7280;
      font-size: 14px;
    }

    .section-title {
      margin: 26px 0 12px;
      font-size: 15px;
      font-weight: 600;
      color: #374151;
    }

    .date-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .date-btn, .time-btn {
      border: 1px solid #e5e7eb;
      background: #fff;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .date-btn {
      border-radius: 16px;
      padding: 14px;
      text-align: left;
    }

    .date-btn.active, .time-btn.active {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }

    .date-btn:hover, .time-btn:hover {
      border-color: #9ca3af;
    }

    .time-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .time-btn {
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
    }

    .summary {
      margin-top: 20px;
      background: #f3f4f6;
      border-radius: 16px;
      padding: 16px;
      font-size: 14px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 8px;
      color: #374151;
    }

    input, textarea {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }

    input:focus, textarea:focus {
      border-color: #6b7280;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .field {
      margin-bottom: 16px;
    }

    .submit-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      background: #111827;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
    }

    .submit-btn:hover {
      opacity: 0.95;
    }

    .tip {
      margin-top: 14px;
      background: #ecfdf5;
      color: #047857;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      display: none;
    }

    .error-tip {
      margin-top: 14px;
      background: #fef2f2;
      color: #b91c1c;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      display: none;
    }

    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
      .date-grid { grid-template-columns: 1fr; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="grid">
      <div class="card">
        <div class="muted">Personal booking page</div>
        <h1>预约我的时间</h1>
        <p>
          朋友可以直接打开这个链接，选择一个你开放的时间段，然后提交预约请求。
          这是一个非常轻量的版本：不需要你自己写后端，不需要数据库，部署也几乎零成本。
        </p>

        <div class="section-title">选择日期</div>
        <div class="date-grid" id="dateGrid"></div>

        <div class="section-title">选择时间段</div>
        <div class="time-list" id="timeList"></div>

        <div class="summary">
          <div><strong>当前选择：</strong></div>
          <div id="selectionText" style="margin-top: 8px;">-</div>
          <div style="margin-top: 8px; color: #6b7280;">
            你可以把这里改成：约饭、喝咖啡、出去玩、看电影、见面聊天等。
          </div>
        </div>
      </div>

      <div class="card">
        <h2>提交预约</h2>
        <p class="muted">点击提交后，预约请求会直接发到你的邮箱，不依赖对方本地邮箱客户端。</p>

        <form id="bookingForm">
          <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE" />
          <input type="hidden" name="subject" value="新的预约请求" />
          <input type="hidden" name="from_name" value="Yuqing Booking Page" />
          <input type="hidden" id="selectedDateInput" name="date" value="" />
          <input type="hidden" id="selectedTimeInput" name="time" value="" />

          <div class="field">
            <label for="name">名字</label>
            <input id="name" name="name" type="text" placeholder="例如：Zhang San" required />
          </div>

          <div class="field">
            <label for="contact">联系方式</label>
            <input id="contact" name="contact" type="text" placeholder="微信 / 手机号 / 邮箱" required />
          </div>

          <div class="field">
            <label for="note">备注</label>
            <textarea id="note" name="note" placeholder="例如：想约你周三晚饭，地点可以在市中心"></textarea>
          </div>

          <button class="submit-btn" type="submit">发送预约请求</button>
          <div class="tip" id="successTip">预约请求已成功发送到你的邮箱。</div>
          <div class="error-tip" id="errorTip">提交失败，请稍后重试。</div>
        </form>
      </div>
    </div>
  </div>

  <script>
    const slots = [
      { date: '2026-03-24', weekday: 'Tuesday', times: ['10:00', '14:00', '16:00'] },
      { date: '2026-03-25', weekday: 'Wednesday', times: ['11:00', '15:00', '19:00'] },
      { date: '2026-03-27', weekday: 'Friday', times: ['13:00', '18:00'] }
    ];

    let selectedDate = slots[0].date;
    let selectedTime = slots[0].times[0];

    const dateGrid = document.getElementById('dateGrid');
    const timeList = document.getElementById('timeList');
    const selectionText = document.getElementById('selectionText');
    const bookingForm = document.getElementById('bookingForm');
    const successTip = document.getElementById('successTip');
    const errorTip = document.getElementById('errorTip');
    const selectedDateInput = document.getElementById('selectedDateInput');
    const selectedTimeInput = document.getElementById('selectedTimeInput');

    function renderDates() {
      dateGrid.innerHTML = '';
      slots.forEach(slot => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'date-btn' + (slot.date === selectedDate ? ' active' : '');
        btn.innerHTML = `
          <div style="font-size:13px; opacity:.8;">${slot.weekday}</div>
          <div style="margin-top:6px; font-size:16px; font-weight:700;">${slot.date}</div>
          <div style="margin-top:8px; font-size:12px; opacity:.8;">${slot.times.length} 个时间段</div>
        `;
        btn.onclick = () => {
          selectedDate = slot.date;
          selectedTime = slot.times[0];
          renderDates();
          renderTimes();
          renderSummary();
        };
        dateGrid.appendChild(btn);
      });
    }

    function renderTimes() {
      const current = slots.find(s => s.date === selectedDate);
      timeList.innerHTML = '';
      current.times.forEach(time => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'time-btn' + (time === selectedTime ? ' active' : '');
        btn.textContent = time;
        btn.onclick = () => {
          selectedTime = time;
          renderTimes();
          renderSummary();
        };
        timeList.appendChild(btn);
      });
    }

    function renderSummary() {
      selectionText.textContent = `${selectedDate} · ${selectedTime}`;
      selectedDateInput.value = selectedDate;
      selectedTimeInput.value = selectedTime;
    }

    bookingForm.addEventListener('submit', async function (e) {
      e.preventDefault();
      successTip.style.display = 'none';
      errorTip.style.display = 'none';

      const formData = new FormData(bookingForm);

      try {
        const response = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          body: formData
        });

        const result = await response.json();

        if (result.success) {
          successTip.style.display = 'block';
          bookingForm.reset();

          selectedDate = slots[0].date;
          selectedTime = slots[0].times[0];
          renderDates();
          renderTimes();
          renderSummary();
        } else {
          errorTip.style.display = 'block';
          console.error(result);
        }
      } catch (error) {
        errorTip.style.display = 'block';
        console.error(error);
      }
    });

    renderDates();
    renderTimes();
    renderSummary();
  </script>
</body>
</html>
